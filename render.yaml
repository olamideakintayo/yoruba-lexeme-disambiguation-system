databases:
  - name: yoruba-lexeme-db
    databaseName: yoruba_lexeme
    user: yoruba_lexeme

services:
  - type: web
    name: yoruba-lexeme-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.seed && python -m app.seed_enrichment && python -m app.backfill_aliases && python -m app.server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yoruba-lexeme-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HOST
        value: 0.0.0.0
      - key: RELOAD
        value: "0"
